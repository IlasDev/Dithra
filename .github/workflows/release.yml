name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Rename APK files
        run: |
          cd app/build/outputs/apk/release
          
          # Find and rename universal APK
          if ls *universal*.apk 1> /dev/null 2>&1; then
            mv *universal*.apk "../../../../../Dithra-${{ env.VERSION }}-universal.apk"
          elif ls *release*.apk 1> /dev/null 2>&1; then
            mv *release*.apk "../../../../../Dithra-${{ env.VERSION }}-universal.apk"
          fi
          
          # Find and rename arm64-v8a APK
          if ls *arm64-v8a*.apk 1> /dev/null 2>&1; then
            mv *arm64-v8a*.apk "../../../../../Dithra-${{ env.VERSION }}-arm64-v8a.apk"
          fi
          
          # Find and rename armeabi-v7a APK
          if ls *armeabi-v7a*.apk 1> /dev/null 2>&1; then
            mv *armeabi-v7a*.apk "../../../../../Dithra-${{ env.VERSION }}-armeabi-v7a.apk"
          fi
          
          # Find and rename x86_64 APK
          if ls *x86_64*.apk 1> /dev/null 2>&1; then
            mv *x86_64*.apk "../../../../../Dithra-${{ env.VERSION }}-x86_64.apk"
          fi

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Fetch all tags
          git fetch --tags --force
          
          # Find the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Regex pattern
          FILTER="^(feat|fix|style|perf|ui|ux|refactor)(\(.+\))?:"
          
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          if [ -z "$PREV_TAG" ]; then
            echo "Initial release." >> $GITHUB_ENV
            git log -E -i --grep="$FILTER" --pretty=format:"* %s (%h)" >> $GITHUB_ENV
          else
            echo "Changes since $PREV_TAG:" >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
            git log ${PREV_TAG}..HEAD -E -i --grep="$FILTER" --pretty=format:"* %s (%h)" >> $GITHUB_ENV
          fi
          echo "" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "Dithra-*.apk"
          body: ${{ env.CHANGELOG }}
          prerelease: ${{ contains(github.ref_name, '-') }}