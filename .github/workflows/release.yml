name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Get version from tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV

      - name: Rename APK files
        run: |
          cd app/build/outputs/apk/release
          
          # Find and rename universal APK
          if ls *universal*.apk 1> /dev/null 2>&1; then
            mv *universal*.apk "../../../../../Dithra-${{ env.VERSION }}-universal.apk"
          elif ls *release*.apk 1> /dev/null 2>&1; then
            mv *release*.apk "../../../../../Dithra-${{ env.VERSION }}-universal.apk"
          fi
          
          # Find and rename arm64-v8a APK
          if ls *arm64-v8a*.apk 1> /dev/null 2>&1; then
            mv *arm64-v8a*.apk "../../../../../Dithra-${{ env.VERSION }}-arm64-v8a.apk"
          fi
          
          # Find and rename armeabi-v7a APK
          if ls *armeabi-v7a*.apk 1> /dev/null 2>&1; then
            mv *armeabi-v7a*.apk "../../../../../Dithra-${{ env.VERSION }}-armeabi-v7a.apk"
          fi
          
          # Find and rename x86_64 APK
          if ls *x86_64*.apk 1> /dev/null 2>&1; then
            mv *x86_64*.apk "../../../../../Dithra-${{ env.VERSION }}-x86_64.apk"
          fi

      - name: Generate changelog from commits
        id: changelog
        run: |
          # Fetch all tags
          git fetch --tags --force
          
          # Find the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          # Regex pattern
          FILTER="^(feat|fix|style|perf|ui|ux|refactor)(\(.+\))?:"
          
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "## What's Changed" >> $GITHUB_ENV
          
          if [ -z "$PREV_TAG" ]; then
            git log -E -i --grep="$FILTER" --pretty=format:"* %s by %an in %h" >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
          else
            git log ${PREV_TAG}..HEAD -E -i --grep="$FILTER" --pretty=format:"* %s by %an in %h" >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
            echo "" >> $GITHUB_ENV
            
            # Check for new contributors by comparing commit emails
            git log ${PREV_TAG} --format="%ae" | sort -u > old_authors.txt
            git log ${PREV_TAG}..HEAD --format="%an|%ae" | sort -u > current_authors.txt
            
            HAS_NEW_CONTRIB=false
            while IFS="|" read -r author_name author_email; do
              if ! grep -qi "^${author_email}$" old_authors.txt; then
                if [ "$HAS_NEW_CONTRIB" = false ]; then
                  echo "## New Contributors" >> $GITHUB_ENV
                  HAS_NEW_CONTRIB=true
                fi
                echo "* ${author_name} made their first contribution" >> $GITHUB_ENV
              fi
            done < current_authors.txt
            
            if [ "$HAS_NEW_CONTRIB" = true ]; then
               echo "" >> $GITHUB_ENV
            fi
            
            # Create the full changelog comparison link using GitHub context variables
            echo "**Full changelog:** https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${{ github.ref_name }}" >> $GITHUB_ENV
          fi
          
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "Dithra-*.apk"
          body: ${{ env.CHANGELOG }}
          prerelease: ${{ contains(github.ref_name, '-') }}